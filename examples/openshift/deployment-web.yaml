apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-web
  namespace: private-ai-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-web
  template:
    metadata:
      labels:
        app: ai-web
    spec:
      containers:
        - name: web
          image: quay.io/example/private-ai-web:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ai-web-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
