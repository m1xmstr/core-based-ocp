apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference-gateway
  namespace: private-ai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-inference-gateway
  template:
    metadata:
      labels:
        app: ai-inference-gateway
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      containers:
        - name: gateway
          image: quay.io/example/private-ai-gateway:latest
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: ai-model-cache
