apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: local-llm-vulkan
  namespace: private-ai-app
spec:
  predictor:
    containers:
      - name: model-server
        image: quay.io/example/llama-vulkan:latest
        args:
          - --model
          - /models/qwen-7b.gguf
          - --host
          - 0.0.0.0
          - --port
          - "8080"
        volumeMounts:
          - name: model-cache
            mountPath: /models
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: ai-model-cache
