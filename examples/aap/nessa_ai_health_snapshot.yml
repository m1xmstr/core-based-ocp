---
- name: Collect private AI platform health snapshot
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check cluster operators
      ansible.builtin.command: oc get co
      register: cluster_operators
      changed_when: false

    - name: Check application pods
      ansible.builtin.command: oc -n private-ai-app get pods
      register: app_pods
      changed_when: false

    - name: Check public route metadata
      ansible.builtin.command: curl -fsS https://private-ai-app.example.com/api/meta
      register: app_meta
      changed_when: false

    - name: Print summary
      ansible.builtin.debug:
        msg:
          - "Cluster operators checked"
          - "Application pods checked"
          - "Route metadata checked"
